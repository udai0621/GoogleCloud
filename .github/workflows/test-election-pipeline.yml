name: Test Eelection Data Pipeline

# election-data-pipeline/ 配下の変更時のみ実行
on:
  push:
    branches: [main, develop]
    paths:
      - 'election-data-pipeline/**' # このディレクトリ配下の変更のみ
      - '.github/workflows/test-election-pipeline.yml'  # このワークフローの変更もトリガーに設定
  pull_request:
    branches: [main]
    paths:
      - 'election-data-pipeline/**'

jobs:
  test-step1-upload:
    name: Test Step1 - Upload to GCS 
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # election-data-pipeline/ ディレクトリに移動してから実行
      - name: Install dependencies
        working-directory: election-data-pipeline/01_upload_to_gcs
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: election-data-pipeline/01_upload_to_gcs
        run: |
          pytest test_upload_to_gcs.py -v --cov=upload_to_gcs --cov-report=term-missing

      - name: Lint with flake8
        working-directory: election-data-pipeline/01_upload_to_gcs
        run: |
          pip install flake8
          flake8 upload_to_gcs.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 upload_to_gcs.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Test Summary
        if: success()
        run: echo "✅ All tests passed successfully!"

  test-step2-dataflow:
    name: Test Step 2 - Dataflow Pipeline
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: election-data-pipeline/02_dataflow_pipeline
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        working-directory: election-data-pipeline/02_dataflow_pipeline
        run: |
          pytest test_election_pipeline.py -v --cov=election_pipeline --cov-report=term-missing

      - name: Lint with flake8
        working-directory: election-data-pipeline/02_dataflow_pipeline
        run: |
          pip install flake8
          # Critical errors only (syntax errors, undefined names, etc.)
          flake8 election_pipeline.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # All errors and warning (non-blocking)
          flake8 election_pipeline.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Test Summary
        if: success()
        run: echo "✅ Step 2 tests passed successfully!"
  
  test-summary:
    name: Test Summary
    needs: [test-step1-upload, test-step2-dataflow]
    runs-on: ubuntu-latest

    steps:
      - name: All tests passed
        run: |
          echo "🎉 All pipeline tests passed successfully!"
          echo "✅ Step 1: Upload to GCS - PASSED"
          echo "✅ Step 2: Dataflow Pipeline - PASSED"

            
